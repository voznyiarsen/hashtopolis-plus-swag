version: "3"
services:
  hashtopolis-backend:
    container_name: hashtopolis-backend
    pull_policy: never
    image: hashtopolis/backend:latest
    platform: linux/arm64
    restart: always
    volumes:
      - hashtopolis:/usr/local/share/hashtopolis:Z
    environment:
      HASHTOPOLIS_DB_USER: ${MYSQL_USER}
      HASHTOPOLIS_DB_PASS: ${MYSQL_PASSWORD}
      HASHTOPOLIS_DB_HOST: hashtopolis-db
      HASHTOPOLIS_DB_DATABASE: ${MYSQL_DATABASE}
      HASHTOPOLIS_ADMIN_USER: ${HASHTOPOLIS_ADMIN_USER}
      HASHTOPOLIS_ADMIN_PASSWORD: ${HASHTOPOLIS_ADMIN_PASSWORD}
      HASHTOPOLIS_APIV2_ENABLE: ${HASHTOPOLIS_APIV2_ENABLE}
    ports:
      - 8080:80
    depends_on:
      hashtopolis-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/api/v2/server", "-o", "/dev/null", "-s"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - proxy_net
  hashtopolis-db:
    container_name: hashtopolis-db
    image: mysql:8.0
    platform: linux/arm64
    restart: always
    volumes:
      - hashtopolis_db:/var/lib/mysql:Z
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - proxy_net
  hashtopolis-frontend:
    container_name: hashtopolis-frontend
    pull_policy: never
    image: hashtopolis/frontend:latest
    platform: linux/arm64
    environment:
      HASHTOPOLIS_BACKEND_URL: ${HASHTOPOLIS_BACKEND_URL}
    restart: always
    ports:
      - 4200:80
    depends_on:
      hashtopolis-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80", "-o", "/dev/null", "-s"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - proxy_net

volumes:
  hashtopolis_db:
  hashtopolis:

networks:
  proxy_net:
    name: proxy_net
    external: true
